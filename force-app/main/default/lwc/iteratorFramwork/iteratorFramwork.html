<template>
    <lightning-card title="My Task List For Today">
        <p class="slds-p-horizontal_small">
            <template for:each={taskList} for:item="eachTask">
                <div key={eachTask.taskId}>
                    {eachTask.taskName} - {eachTask.taskProgress}
                </div>
            </template>
        </p>
        <p slot="footer">All the best!</p>
    </lightning-card>

    <lightning-card title="My Task List For Today Via Iterator">
        <p class="slds-p-horizontal_small">
            <template iterator:task={taskList}>
                <template lwc:if={task.first}>
                    Top Priority For The Day:
                    <p key={task.value.taskId}><b>{task.value.taskName}</b></p>
                </template>
                <div key={task.value.taskId}>
                    {task.value.taskName} - {task.value.taskProgress}
                </div>

                <template lwc:if={task.last}>
                    Least Priority For The Day:
                    <p key={task.value.taskId}><i>{task.value.taskName} - {task.value.taskProgress}</i></p>
                </template>
            </template>
        </p>
        <p slot="footer">All the best!</p>
    </lightning-card>

</template>
