<template>
    <lightning-card class="slds-m-bottom_medium" title="Find Your Zodiac Match">
        <lightning-input class="slds-m-around_medium" value={userName} onchange={handleNameChange} type="text"
            label="Enter your name"></lightning-input>
        <lightning-input class="slds-m-around_medium" value={userDOB} onchange={handleDateChange} type="date"
            label="Enter your DOB"></lightning-input>

        <lightning-button variant="brand" label="Click me!" title="Click me!" onclick={handleSubmit}
            class="slds-align_absolute-center slds-m-around_medium"></lightning-button>
    </lightning-card>
    <template lwc:if={resultRecieved}>
        <div class="slds-align_absolute-center">
            <lightning-card class="slds-align_absolute-center" variant="Narrow" title="Here is your info..."
                footer={userProfile.sign}>
                <p class="slds-align_absolute-center slds-p-horizontal_small">
                    {userProfile.emoji} <br />
                    {userProfile.trait}
                </p>
            </lightning-card>
        </div>
    </template>
</template>
